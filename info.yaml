# Tiny Tapeout project information
yaml_version: 6

project:
  title:        "ASCON-CXOF Hash Chain Accelerator"
  author:       "Dr. Mohamed El-Hadedy"
  discord:      ""
  description:  "ASCON-CXOF customizable extendable-output function hardware accelerator with UART-framed protocol. Implements NIST SP 800-232 ASCON-CXOF128 as a building block for post-quantum cryptographic workloads."
  language:     "Verilog"
  clock_hz:     50000000

  # 2x2 tiles - design contains a 320-bit ASCON state, protocol parser
  # with byte buffer, register file, full UART, and 12-round permutation.
  tiles: "8x2"

  # Top module name (must start with tt_um_)
  top_module:  "tt_um_ascon_cxof"

  # Source files (must be in ./src, listed one per line)
  source_files:
    - "project.v"
    - "ascon_cxof_top.v"
    - "ascon_permutation.v"
    - "ascon_round.v"
    - "cxof_controller.v"
    - "uart_rx.v"
    - "uart_tx.v"
    - "baud_gen.v"
    - "protocol_parser.v"
    - "crc16_ccitt.v"
    - "register_file.v"

# Pinout
pinout:
  # Inputs (ui_in[7:0])
  ui[0]: "uart_rx"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs (uo_out[7:0])
  uo[0]: "uart_tx"
  uo[1]: "done_irq"
  uo[2]: "busy"
  uo[3]: "error"
  uo[4]: "state_dbg0"
  uo[5]: "state_dbg1"
  uo[6]: "heartbeat"
  uo[7]: "rx_active"

  # Bidirectional pins (uio[7:0])
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""
