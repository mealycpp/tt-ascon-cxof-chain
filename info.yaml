# Tiny Tapeout project information
project:
  title:       "ASCON-CXOF Hash Chain Accelerator"
  author:      "Dr. Mohamed El-Hadedy"
  description: "ASCON-CXOF customizable extendable-output function hardware accelerator with UART-framed protocol. Implements NIST SP 800-232 ASCON-CXOF128 as a chain accelerator. Designed as a security peripheral for post-quantum cryptographic workloads on flight controllers and embedded systems. Hash-based PQC building block (SLH-DSA, LMS, XMSS inner loops)."
  language:    "Verilog"
  clock_hz:    50000000   # 25 MHz - half of TT default; gives ASCON-p combinational depth slack

  # Source files (relative to src/)
  source_files:
    - "project.v"
    - "ascon_cxof_top.v"
    - "ascon_permutation.v"
    - "ascon_round.v"
    - "cxof_controller.v"
    - "uart_rx.v"
    - "uart_tx.v"
    - "baud_gen.v"
    - "protocol_parser.v"
    - "crc16_ccitt.v"
    - "register_file.v"

  # Top module name - MUST start with tt_um_
  top_module:  "tt_um_ascon_cxof"

  # 3 tiles wide, 1 tile high
  tiles: "3x1"

# Pin layout
pinout:
  # ui_in[7:0] - dedicated inputs
  ui[0]: "uart_rx"          # UART receive from host
  ui[1]: "ext_clk_en"       # 1 = use ui[2] as clock, 0 = use TT default clock
  ui[2]: "ext_clk"          # optional external clock input
  ui[3]: "unused"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  # uo_out[7:0] - dedicated outputs
  uo[0]: "uart_tx"          # UART transmit to host
  uo[1]: "done_irq"         # high when result ready to read
  uo[2]: "busy"             # high while permutation running
  uo[3]: "error"            # protocol or CRC error
  uo[4]: "state_lsb"        # debug: FSM state low bit
  uo[5]: "state_msb"        # debug: FSM state high bit
  uo[6]: "heartbeat"        # divided clock for visible activity
  uo[7]: "rx_active"        # high while receiving a frame

  # uio[7:0] - bidirectional pins (configured as input here; uio_oe = 0)
  uio[0]: "reserved"
  uio[1]: "reserved"
  uio[2]: "reserved"
  uio[3]: "reserved"
  uio[4]: "reserved"
  uio[5]: "reserved"
  uio[6]: "reserved"
  uio[7]: "reserved"
